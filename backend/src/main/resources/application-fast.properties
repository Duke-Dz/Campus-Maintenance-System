## Fast local startup profile (development only)
## Use with: mvn -q -DskipTests spring-boot:run -Dspring-boot.run.profiles=fast

# Start app context faster; first access to some beans may be slower.
spring.main.lazy-initialization=true
spring.data.jpa.repositories.bootstrap-mode=deferred

# Skip expensive schema auto-update during startup.
# Keep this profile only when schema is already up to date.
spring.jpa.hibernate.ddl-auto=none

# Avoid demo seeding on startup.
app.seed.demo-data=false

# Reduce noise while iterating.
logging.level.org.springframework=INFO
logging.level.org.hibernate=WARN
